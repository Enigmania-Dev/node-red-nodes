<script type="text/javascript">
    RED.nodes.registerType('AutomatedHint',{
        category: 'function',
        color: '#a6bbcf',
        defaults: {
            name: {value:""},
            autoArm: {value:true, required:true, validate: (v) => v === "true" || v === "false"},
            // Hints should be an array of objects with time and message properties
            // It has to have at least one entry.
            hints: {value:[], required:false, validate: function(v) {
                if (!Array.isArray(v)) {
                    return false;
                }
                for (let hint of v) {
                    if (!Number.isInteger(hint.time) || typeof hint.message !== 'string') {
                        return false;
                    }
                }
                return true;
            }}
        },
        inputs: 1,
        outputs: 2,
        icon: "file.svg",
        label: function() {
            return this.name||"AutomatedHint";
        },
        oneditprepare: function() {
            const hintsContainer = $("#node-input-hints-container");
            const hints = Array.isArray(this.hints) ? this.hints : [];

            function createHintRow(hint) {
                const row = $(
                    '<div style="display:flex; gap:8px; align-items:center; width:100%;">' +
                        '<label style="flex-shrink:0;">Time (s):</label>' +
                        '<input type="number" class="node-input-hint-time" min="0" step="1" style="width:110px;"><br/>' +
                        '<label style="flex-shrink:0;">File:</label>' +
                        '<input type="text" class="node-input-hint-message" placeholder="Path to hint file" style="flex:1;">' +
                    '</div>'
                );

                row.find(".node-input-hint-time").val(hint && Number.isInteger(hint.time) ? hint.time : 0);
                row.find(".node-input-hint-message").val(hint && typeof hint.message === "string" ? hint.message : "");
                return row;
            }

            hintsContainer.editableList({
                addButton: true,
                removable: true,
                sortable: true,
                addItem: function(container, i, hint) {
                    container.append(createHintRow(hint));
                },
                sort: function(elA, elB) {
                    return elA.time - elB.time;
                }
            });

            for (const hint of hints) {
                hintsContainer.editableList("addItem", hint);
            }

            $("#node-input-hints-add").on("click", function() {
                hintsContainer.editableList("addItem", { time: 0, message: "" });
            });

            $("#node-input-autoArm").val(this.autoArm);
        },
        oneditsave: function() {
            const hints = [];
            $("#node-input-hints-container").editableList("items").each(function() {
                const row = $(this);
                const time = Number.parseInt(row.find(".node-input-hint-time").val(), 10);
                const message = row.find(".node-input-hint-message").val();

                if (Number.isInteger(time) && typeof message === "string") {
                    hints.push({ time: time, message: message });
                }
            });
            $("#node-input-autoArm").val() === "true" ? this.autoArm = true : this.autoArm = false;

            this.hints = hints;
        },
        oneditresize: function(size) {
            var rows = $("#dialog-form>div:not(.node-input-hints-container-row)");
            var height = size.height;
            for (var i=0; i<rows.length; i++) {
                height -= $(rows[i]).outerHeight(true);
            }
            var editorRow = $("#dialog-form>div.node-input-hints-container-row");
            height -= (parseInt(editorRow.css("marginTop"))+parseInt(editorRow.css("marginBottom")));
            height += 16;
            height -= 40; // Extra padding for the add button and list spacing
            $("#node-input-hints-container").editableList('height',height);
        }
    });
</script>

<script type="text/html" data-template-name="AutomatedHint">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-autoArm"><i class="fa fa-clock"></i> Start Time</label>
        <select id="node-input-autoArm">
            <option value="true">Start</option>
            <option value="false">previous Hint</option>
        </select>
        <p style="font-size:0.9em; color:#666; margin:0 0 8px 0;"><i>If 'previous Hint' the node will wait until the previous hint is given. Otherwise, it will start immediately.</i></p>
    </div>
    <div class="form-row node-input-hints-container-row">
        <label for="node-input-hints-container"><i class="fa fa-list"></i> Hints</label>
        <p style="font-size:0.9em; color:#666; margin:0 0 8px 0;"><i>Time is the interval between hints</i></p>
        <div style="display:flex; flex-direction:column; gap:8px; width:100%;">
            <ol id="node-input-hints-container" style="list-style-type:none; margin:0; padding:0;"></ol>
        </div>
    </div>
</script>

<script type="text/html" data-help-name="AutomatedHint">
    <p>
        This node provides hints based on riddle state and time.
        It can be configured with a list of hints, each having a time (in seconds) and a message (path to the hint file). 
        The node will output the hints at the specified intervals after being triggered. 
        The trigger can be either the start of the puzzle or the previous hint, depending on the configuration.
    </p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload
            <span class="property-type">string | buffer</span>
        </dt>
        <dd> Contains i.e. the time elapsed since the puzzle started in ms. </dd>
        <dt class="optional">topic <span class="property-type">string</span></dt>
        <dd> the type of message, decides the behavior of the node:
            <ul>
                <li><strong>TIME</strong>: The node will check if it's time to output the next hint based on the elapsed time.</li>
                <li><strong>ARM</strong>: The node will use the payload as time of last hint and start providing hints based on that.</li>
                <li><strong>RESET</strong>: The node will be reset to initial state.</li>
                <li><strong>SOLVED</strong>: The node will mark the puzzle as solved and stop providing hints.</li>
            </ul>
        </dd>
    </dl>

    <h3>Outputs</h3>
    <ol class="node-ports">
        <li>Hint output
            <dl class="message-properties">
                <dt>topic <span class="property-type">string</span></dt>
                <dd>the topic is "HINT".</dd>
                <dt>payload <span class="property-type">string</span></dt>
                <dd>the hint message filename.</dd>
            </dl>
        </li>
        <li>ARM output
            <dl class="message-properties">
                <dt>topic <span class="property-type">string</span></dt>
                <dd>the topic is "ARM".</dd>
                <dt>payload <span class="property-type">string</span></dt>
                <dd>the time when the next hint would have come.</dd>
            </dl>
        </li>
    </ol>
</script>
